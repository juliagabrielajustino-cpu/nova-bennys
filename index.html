<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Benny's</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <canvas id="canvas"></canvas>

    <main class="calculadora">

        <header class="cabecalho">
            
            <img src="bennys.png" alt="Logo Benny's" class="logo"

            <div>
                <h1>BENNY'S</h1>
                <p>Calculadora de Serviços</p>
            </div>
        </header>

        <section class="servicos">

            <div class="servico">
                <div>
                    <strong>Conserto</strong>
                    <span>R$ 1.500</span>
                </div>

                <input
                    type="number"
                    id="conserto"
                    min="0"
                    value="0"
                    inputmode="numeric"
                >
            </div>

            <div class="servico">
                <div>
                    <strong>Pneu</strong>
                    <span>R$ 1.200</span>
                </div>

                <input
                    type="number"
                    id="pneu"
                    min="0"
                    value="0"
                    inputmode="numeric"
                >
            </div>

            <div class="servico">
                <div>
                    <strong>Chave</strong>
                    <span>R$ 1.500</span>
                </div>

                <input
                    type="number"
                    id="chave"
                    min="0"
                    value="0"
                    inputmode="numeric"
                >
            </div>

            <div class="servico">
                <div>
                    <strong>Kit Básico</strong>
                    <span>R$ 1.500</span>
                </div>

                <input
                    type="number"
                    id="kitBasico"
                    min="0"
                    value="0"
                    inputmode="numeric"
                >
            </div>

            <div class="servico">
                <div>
                    <strong>Kit Avançado</strong>
                    <span>R$ 3.500</span>
                </div>

                <input
                    type="number"
                    id="kitAvancado"
                    min="0"
                    value="0"
                    inputmode="numeric"
                >
            </div>

            <div class="servico tuning">
                <div>
                    <strong>Valor do Tuning</strong>
                    <span>Digite o valor original</span>
                </div>

                <input
                    type="number"
                    id="tuning"
                    min="0"
                    value="0"
                    inputmode="decimal"
                >
            </div>

        </section>

        <section class="parcerias">

            <h2>Tipo de parceria</h2>

            <label class="opcao">
                <input
                    type="radio"
                    name="parceria"
                    value="0"
                    checked
                >

                <span>
                    <strong>Sem parceria</strong>
                    <small>Serviços normais • Tuning +30%</small>
                </span>
            </label>

            <label class="opcao">
                <input
                    type="radio"
                    name="parceria"
                    value="1"
                >

                <span>
                    <strong>Parceria 1</strong>
                    <small>10% de desconto geral</small>
                </span>
            </label>

            <label class="opcao">
                <input
                    type="radio"
                    name="parceria"
                    value="2"
                >

                <span>
                    <strong>Parceria 2</strong>
                    <small>20% de desconto geral</small>
                </span>
            </label>

        </section>

        <section class="resumo">

            <div class="linha-resumo">
                <span>Subtotal</span>
                <strong id="subtotal">R$ 0,00</strong>
            </div>

            <div class="linha-resumo">
                <span>Desconto</span>
                <strong id="desconto">R$ 0,00</strong>
            </div>

            <div class="linha-resumo total">
                <span>Total</span>
                <strong id="resultado">R$ 0,00</strong>
            </div>

        </section>

        <div class="botoes">

            <button id="calcular" type="button">
                CALCULAR
            </button>

            <button id="limpar" type="button">
                LIMPAR
            </button>

        </div>

        <p id="mensagem"></p>

    </main>

    <script src="script.js"></script>

</body>
</html>
