<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login | Sistema Benny's</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="login-container">

        <section class="login-card">

            <img
                src="bennys.png"
                alt="Logo Benny's"
                class="logo"
            >

            <h1>Sistema Benny's</h1>

            <p>
                Entre com seu e-mail e sua senha.
            </p>

            <form id="formLogin">

                <label for="email">
                    E-mail
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="seuemail@exemplo.com"
                    autocomplete="email"
                    required
                >

                <label for="senha">
                    Senha
                </label>

                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    autocomplete="current-password"
                    required
                >

                <button
                    type="submit"
                    id="botaoEntrar"
                >
                    Entrar
                </button>

            </form>

            <p
                id="mensagem"
                class="mensagem"
                aria-live="polite"
            ></p>

        </section>

    </main>

    <script type="module" src="auth.js"></script>

</body>
</html>
