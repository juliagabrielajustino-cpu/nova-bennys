<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Benny's</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="card">

<img src="bennys.png" class="logo" alt="Logo Benny's">

<h1>Calculadora Benny's</h1>

<p>Monte seu orçamento rapidamente.</p>

<h2>🔧 Serviços</h2>

<div class="servicos">

<div class="item">
<label>🛞 Pneu</label>
<input type="number" id="pneu" min="0" value="0">
</div>

<div class="item">
<label>🔧 Chave Inglesa</label>
<input type="number" id="chave" min="0" value="0">
</div>

<div class="item">
<label>📦 Kit Básico</label>
<input type="number" id="kitBasico" min="0" value="0">
</div>

<div class="item">
<label>🚗 Kit Avançado</label>
<input type="number" id="kitAvancado" min="0" value="0">
</div>

<div class="item">
<label>🩹 Reparinho</label>
<input type="number" id="reparinho" min="0" value="0">
</div>

</div>

<hr>

<h2>🤝 Parceria</h2>

<select id="parceria">

<option value="0">Sem parceria</option>

<option value="10">Parceria 1 (-10%)</option>

<option value="20">Parceria 2 (-20%)</option>

<option value="15">Policia (-15%)</option>

</select>

<div class="externo">

<label>

<input type="checkbox" id="externo">

🚗 Atendimento externo

</label>

</div>

<div id="campoLocal">

<h2>📍 Deslocamento</h2>

<select id="local">

<option value="500">Sul (+R$500)</option>

<option value="1000">Sand (+R$1000)</option>

<option value="1500">Paleto Bay (+R$1500)</option>

</select>

</div>

<button id="calcular">

GERAR ORÇAMENTO

</button>

<div class="orcamento">

<h2>📋 Orçamento</h2>

<div id="resumo">

Nenhum serviço selecionado.

</div>

<hr>

<div class="linha">

<span>Subtotal</span>

<strong id="subtotal">

R$0,00

</strong>

</div>

<div class="linha">

<span>Desconto</span>

<strong id="desconto">

R$0,00

</strong>

</div>

<div class="linha">

<span>Deslocamento</span>

<strong id="valorLocal">

R$0,00

</strong>

</div>

<hr>

<div class="linha total">

<span>TOTAL</span>

<strong id="total">

R$0,00

</strong>

</div>

</div>

<button id="copiar">

📋 Copiar orçamento

</button>

</div>

</div>

<script src="script.js"></script>

</body>

        </html>
