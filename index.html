<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Benny's</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="card">

<img src="bennys.png" class="logo">

<h1>Calculadora Benny's</h1>

<p>Monte seu orçamento de forma rápida.</p>

<!-- SERVIÇOS -->

<div class="titulo">

🔧 Serviços

</div>

<div class="servico">

<span>🛞 Pneu</span>

<div class="contador">

<button class="menos" data-servico="pneu">−</button>

<span id="qtd-pneu">0</span>

<button class="mais" data-servico="pneu">+</button>

</div>

</div>

<div class="servico">

<span>🔧 Chave Inglesa</span>

<div class="contador">

<button class="menos" data-servico="chave">−</button>

<span id="qtd-chave">0</span>

<button class="mais" data-servico="chave">+</button>

</div>

</div>

<div class="servico">

<span>📦 Kit Básico</span>

<div class="contador">

<button class="menos" data-servico="kitBasico">−</button>

<span id="qtd-kitBasico">0</span>

<button class="mais" data-servico="kitBasico">+</button>

</div>

</div>

<div class="servico">

<span>🚗 Kit Avançado</span>

<div class="contador">

<button class="menos" data-servico="kitAvancado">−</button>

<span id="qtd-kitAvancado">0</span>

<button class="mais" data-servico="kitAvancado">+</button>

</div>

</div>

<div class="servico">

<span>🩹 Reparinho</span>

<div class="contador">

<button class="menos" data-servico="reparinho">−</button>

<span id="qtd-reparinho">0</span>

<button class="mais" data-servico="reparinho">+</button>

</div>

</div>

<hr>

<!-- PARCERIA -->

<label>

🤝 Parceria

</label>

<select id="parceria">

<option value="0">

Sem parceria

</option>

<option value="10">

Parceria 1 (-10%)

</option>

<option value="20">

Parceria 2 (-20%)

</option>

<option value="15">

Parceria 3 (-15%)

</option>

</select>

<br><br>

<label class="check">

<input type="checkbox" id="externo">

🚗 Atendimento externo

</label>

<div id="campoLocal">

<label>

📍 Local

</label>

<select id="local">

<option value="500">

Sul (+500)

</option>

<option value="1000">

Sand (+1000)

</option>

<option value="1500">

Paleto Bay (+1500)

</option>

</select>

</div>

<button id="calcular">

GERAR ORÇAMENTO

</button>

<div class="resultado">

<h2>Total</h2>

<h3 id="total">

R$ 0,00

</h3>

<div id="resumo">

</div>

</div>

<button id="copiar">

📋 Copiar orçamento

</button>

</div>

</div>

<script src="script.js"></script>

</body>

        </html>
