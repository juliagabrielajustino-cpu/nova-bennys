<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Benny's</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <img src="bennys.png" class="logo" alt="Logo Benny's">

            <h1>Calculadora Benny's</h1>

            <p>
                Escolha o serviço, a parceria e o deslocamento para calcular o valor final.
            </p>

            <div class="campo">

                <label>Serviço</label>

                <select id="servico">

                    <option value="pneu">Pneu</option>

                    <option value="chave">Chave Inglesa</option>

                    <option value="kitBasico">Kit Básico</option>

                    <option value="kitAvancado">Kit Avançado</option>

                    <option value="reparinho">Reparinho</option>

                </select>

            </div>

            <div class="campo">

                <label>Parceria</label>

                <select id="parceria">

                    <option value="0">Sem parceria</option>

                    <option value="10">Parceria 1 (-10%)</option>

                    <option value="20">Parceria 2 (-20%)</option>

                    <option value="15">Parceria 3 (-15%)</option>

                </select>

            </div>

            <div class="campo">

                <label>Deslocamento</label>

                <select id="local">

                    <option value="500">Sul (+R$500)</option>

                    <option value="1000">Sand (+R$1.000)</option>

                    <option value="1500">Paleto Bay (+R$1.500)</option>

                </select>

            </div>

            <button id="calcular">
                CALCULAR
            </button>

            <div class="resultado">

                <div class="linha">
                    <span>Serviço</span>
                    <strong id="valorServico">R$ 0,00</strong>
                </div>

                <div class="linha">
                    <span>Desconto</span>
                    <strong id="valorDesconto">R$ 0,00</strong>
                </div>

                <div class="linha">
                    <span>Deslocamento</span>
                    <strong id="valorLocal">R$ 0,00</strong>
                </div>

                <hr>

                <div class="linha total">

                    <span>TOTAL</span>

                    <strong id="resultado">

                        R$ 0,00

                    </strong>

                </div>

            </div>

        </div>

    </div>

<script src="script.js"></script>

</body>
    </html>
